<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NUTRIBOT</title>
    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <!-- Include Tailwind CSS via CDN for rapid styling to match original React app -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              emerald: {
                50: '#ecfdf5',
                400: '#34d399',
                500: '#10b981',
                600: '#059669',
                900: '#064e3b',
                950: '#022c22',
              }
            },
            fontFamily: {
              sans: ['Outfit', 'sans-serif'],
              mono: ['JetBrains Mono', 'monospace'],
            }
          }
        }
      }
    </script>
</head>
<body class="bg-[#f5f5f0] text-emerald-950 font-sans selection:bg-emerald-500/30 overflow-x-hidden min-h-screen relative">
    
    <!-- Background Elements -->
    <div class="background-mesh" id="backgroundMesh">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
        <!-- Leaves will be generated by JS -->
        <div id="leavesContainer"></div>
    </div>

    <div class="max-w-6xl mx-auto px-6 py-8 relative z-10">
        
        <!-- Navigation -->
        <nav class="glass-panel px-6 py-4 flex items-center justify-between mb-12 rounded-[32px]">
            <div class="flex items-center gap-2 font-black text-xl tracking-tighter text-emerald-950">
                <i class="fa-solid fa-leaf text-emerald-500"></i>
                <span>NUTRI<span class="text-emerald-500">BOT</span></span>
            </div>
            <div class="flex items-center gap-4">
                <button id="resetDataBtn" class="px-4 py-2 rounded-lg text-xs font-bold hover:bg-red-500/10 text-red-400 transition-colors">
                    RESET DATA
                </button>
                <button id="connectDeviceBtn" class="px-6 py-2 rounded-lg text-xs font-bold transition-all bg-white text-black hover:bg-emerald-50 shadow-lg shadow-emerald-900/10 hover-lift">
                    CONNECT DEVICE
                </button>
            </div>
        </nav>

        <!-- Main Controls -->
        <div class="flex flex-col items-center justify-center mb-20 relative">
            <div id="heroAura" class="absolute -inset-20 bg-emerald-400/20 blur-[100px] rounded-full transition-opacity duration-1000 opacity-20"></div>
            
            <button id="mainToggleBtn" class="group relative flex flex-col items-center gap-2 px-20 py-10 rounded-[3rem] font-black transition-all duration-700 overflow-hidden bg-white/40 backdrop-blur-3xl text-emerald-900 border-[3px] border-white/80 hover:bg-white/60 hover:scale-105 shadow-[0_20px_60px_rgba(0,0,0,0.1)]">
                <div class="absolute inset-0 w-[200%] h-full bg-gradient-to-r from-transparent via-white/30 to-transparent -translate-x-full group-hover:animate-[shimmer_2s_infinite] pointer-events-none"></div>
                <div id="innerGlow" class="absolute inset-0 bg-gradient-to-b from-emerald-400/5 to-transparent animate-pulse"></div>
                
                <div class="flex items-center gap-4">
                    <i id="mainIcon" class="fa-solid fa-bolt text-emerald-600 animate-bounce text-4xl"></i>
                    <div class="flex flex-col items-start">
                        <span id="mainText" class="text-3xl tracking-[0.2em] relative z-10">START SYSTEM</span>
                        <span id="subTextAction" class="text-[10px] font-bold tracking-[0.4em] text-white/60 uppercase hidden">READY</span>
                    </div>
                </div>
                
                <span id="mainSubtext" class="text-[10px] font-bold tracking-[0.4em] text-emerald-900/40 uppercase mt-1">Initiate Botanical Protocol</span>
                <div id="activeGlow" class="absolute inset-0 rounded-2xl border-2 border-emerald-400/50 animate-ping pointer-events-none hidden"></div>
            </button>
        </div>

        <!-- Plant Slots -->
        <section class="mb-12">
            <div class="mb-8 text-center">
                <span class="inline-block px-3 py-1 bg-emerald-500/20 text-emerald-400 text-[10px] font-bold tracking-[0.2em] rounded-full mb-4">ECO-SYSTEM</span>
                <h2 class="text-4xl font-black tracking-tight mb-2 text-emerald-950">PLANT SLOTS</h2>
                <p class="text-emerald-900/40 text-sm">Manage and configure nutrient delivery for each plot.</p>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-8" id="slotsContainer">
                <!-- Slots are generated by JS -->
            </div>
        </section>

        <!-- Terminal -->
        <footer class="terminal glass-panel mt-8 overflow-hidden rounded-[32px]">
            <div class="flex items-center justify-between px-4 py-3 border-b border-white/20">
                <div class="term-dots flex">
                    <span class="w-3 h-3 rounded-full mr-2 bg-[#ff5f56]"></span>
                    <span class="w-3 h-3 rounded-full mr-2 bg-[#ffbd2e]"></span>
                    <span class="w-3 h-3 rounded-full mr-2 bg-[#27c93f]"></span>
                </div>
                <div class="flex items-center gap-2 text-xs font-medium opacity-60">
                    <i class="fa-solid fa-terminal text-[10px]"></i>
                    <span>SYSTEM LOGS</span>
                </div>
            </div>
            <div id="terminalBody" class="term-body p-4 max-h-[150px] overflow-y-auto font-mono text-sm text-emerald-800 bg-white/50">
                <div class="opacity-50">READY. CONNECT TO INITIATE...</div>
            </div>
        </footer>

        <!-- Confirmation Modal -->
        <div id="confirmModal" class="fixed inset-0 z-50 flex items-center justify-center p-6 bg-emerald-950/40 backdrop-blur-md hidden transition-opacity duration-300 opacity-0">
            <div class="glass-panel max-w-md w-full p-8 text-center transform transition-all duration-300 scale-95 rounded-[32px]">
                <div class="w-16 h-16 bg-red-500/20 rounded-full flex items-center justify-center mx-auto mb-6">
                    <i class="fa-solid fa-triangle-exclamation text-red-400 text-3xl"></i>
                </div>
                <h3 class="text-2xl font-black mb-2">ERASE ALL DATA?</h3>
                <p class="text-emerald-900/60 text-sm mb-8">This action is irreversible. All plant species, NPK data, and images will be permanently deleted from the system.</p>
                <div class="flex gap-4">
                    <button id="cancelResetBtn" class="flex-1 px-6 py-3 rounded-xl font-bold bg-white/50 hover:bg-white/80 transition-colors">CANCEL</button>
                    <button id="confirmResetBtn" class="flex-1 px-6 py-3 rounded-xl font-bold bg-red-500 text-white shadow-lg shadow-red-500/30 hover:bg-red-600 transition-colors">ERASE</button>
                </div>
            </div>
        </div>

    </div>

    <!-- Scripts -->
    <script src="scripts.js"></script>
</body>
</html>
